# ============================================================
# lineFresh - Nginx 子路徑設定
# 加入到 weihongweb.com 的 server {} 區塊內
#
# 在 GCP VM 上操作：
#   sudo nano /etc/nginx/sites-available/weihongweb.com
#   （把下面的 location 區塊加進去）
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

location /LineFresh/ {
    alias /var/www/lineFresh/;
    index index.html;
    
    # Vue Router history mode：所有子路徑都指回 index.html
    try_files $uri $uri/ /LineFresh/index.html;
    
    # 靜態資源快取
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        alias /var/www/lineFresh/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
